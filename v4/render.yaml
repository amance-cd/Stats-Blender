services:
  - type: web
    name: stats-blender
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app -w 1 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    rootDir: backend
    envVars:
      - key: SPOTIFY_CLIENT_ID
        sync: false
      - key: SPOTIFY_CLIENT_SECRET
        sync: false
      - key: DATABASE_DIR
        value: /data
      - key: PYTHON_VERSION
        value: "3.11.6"
    disk:
      name: stats-blender-data
      mountPath: /data
      sizeGB: 1
